version: 2

project_name: framework-mcp

builds:
  - main: ./cmd/framework-mcp
    binary: framework-mcp
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - THIRD_PARTY_LICENSES

checksum:
  name_template: checksums.txt

release:
  mode: keep-existing
  prerelease: auto
